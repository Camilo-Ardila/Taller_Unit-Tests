name: CI - Tests + JaCoCo Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      # ← CORRECCIÓN AQUÍ: working-directory apunta a 'demo' donde está gradlew
      - name: Dar permiso de ejecución al wrapper gradlew
        working-directory: demo
        run: chmod +x gradlew

      # Los pasos siguientes también deben usar working-directory: demo
      # para que ./gradlew funcione correctamente
      - name: Ejecutar tests y generar reporte JaCoCo
        working-directory: demo
        run: ./gradlew clean test jacocoTestReport --no-daemon

      - name: Publicar reporte JaCoCo en PR (comentario + checks)
        if: always()
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: ${{ github.workspace }}/demo/build/reports/jacoco/test/jacocoTestReport.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 60
          min-coverage-changed-files: 70
          title: "Reporte de Cobertura JaCoCo"
          update-comment: true