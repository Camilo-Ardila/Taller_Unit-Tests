name: CI - Tests + JaCoCo Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup JDK 17 (o 21 según tu proyecto)
        uses: actions/setup-java@v4
        with:
          java-version: '17'           # cámbialo a '21' si usas Java 21
          distribution: 'temurin'

      - name: Dar permiso de ejecución al wrapper
        working-directory: demo
        run: chmod +x gradlew

      - name: Ejecutar tests y generar cobertura
        working-directory: demo
        run: ./gradlew clean test jacocoTestReport --no-daemon

      - name: Mostrar resumen de cobertura en el job
        if: always()                     # se ejecuta incluso si falla el test
        uses: irvifa/jacoco-report-action@v1.1.2  # acción popular y simple
        with:
          working-directory: demo
          jacoco-csv-file: build/reports/jacoco/test/jacocoTestReport.csv
          # Opcional: mínimo para que marque como fallo en el summary
          coverage-results-path: build/reports/jacoco/test/jacocoTestReport.xml
          minimum-coverage: 50
          title: "Resumen de Cobertura JaCoCo"

      - name: Subir reporte HTML como artifact (opcional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: demo/build/reports/jacoco/test/html/