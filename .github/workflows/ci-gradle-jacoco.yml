name: CI - Tests + JaCoCo Coverage

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup JDK 25 (tu versión)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Dar permiso al wrapper
        working-directory: .   # o 'demo' si tus fuentes están ahí
        run: chmod +x gradlew

      - name: Ejecutar tests y generar reporte JaCoCo
        working-directory: .   # ajusta si es necesario
        run: ./gradlew clean test jacocoTestReport --no-daemon

      - name: Publicar reporte JaCoCo en PR (comentario + checks)
        if: always()  # se ejecuta aunque fallen tests
        uses: madrapps/jacoco-report@v1.7.2   # versión reciente y estable
        with:
          paths: ${{ github.workspace }}/build/reports/jacoco/test/jacocoTestReport.xml   # ruta exacta de tu XML
          token: ${{ secrets.GITHUB_TOKEN }}   # necesario para comentar en PR
          min-coverage-overall: 60             # ajusta a tu gusto (en %)
          min-coverage-changed-files: 70       # opcional: más estricto en cambios
          title: "Reporte de Cobertura JaCoCo"
          update-comment: true                 # actualiza comentario existente si hay